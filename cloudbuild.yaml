# Monorepo Cloud Build — always uses repository root (.) as Docker build context.
#
# Cloud Run console (recommended):
#   Source location / Dockerfile: Dockerfile
#   Build context directory: /   (repository root)
#
# Manual build:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions _REGION=asia-southeast1

substitutions:
  _SERVICE_NAME: web
  _DOCKERFILE: Dockerfile
  _REGION: asia-southeast1

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - ${_DOCKERFILE}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE_NAME}:$COMMIT_SHA
      - --build-arg
      - GIT_REF=$COMMIT_SHA
      - .

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE_NAME}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
