name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options:
          - staging
          - production
        default: staging
  push:
    branches:
      - main
      - develop

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: asia-southeast1
  PNPM_VERSION: 9.6.0
  DOCKER_BUILDKIT: 1

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  migrate:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Apply migrations
        run: pnpm --filter @varnarc/database migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  build-images:
    runs-on: ubuntu-latest
    needs: migrate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        continue-on-error: true
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        continue-on-error: true
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t varnarc-api:${{ github.sha }} .

      - name: Build Web image
        run: docker build -f docker/Dockerfile.web -t varnarc-web:${{ github.sha }} .

      - name: Build Admin image
        run: docker build -f docker/Dockerfile.admin -t varnarc-admin:${{ github.sha }} .

      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        continue-on-error: true
        with:
          image-ref: varnarc-api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Push images
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "GCP_PROJECT_ID not set — skipping image push. See deploy/cloud-run/README.md"
            exit 0
          fi
          REGISTRY="${{ env.GCP_REGION }}-docker.pkg.dev/${GCP_PROJECT_ID}/varnarc"
          docker tag varnarc-api:${{ github.sha }} "$REGISTRY/api:${{ github.sha }}"
          docker tag varnarc-web:${{ github.sha }} "$REGISTRY/web:${{ github.sha }}"
          docker tag varnarc-admin:${{ github.sha }} "$REGISTRY/admin:${{ github.sha }}"
          docker push "$REGISTRY/api:${{ github.sha }}"
          docker push "$REGISTRY/web:${{ github.sha }}"
          docker push "$REGISTRY/admin:${{ github.sha }}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag "$REGISTRY/api:${{ github.sha }}" "$REGISTRY/api:latest"
            docker tag "$REGISTRY/web:${{ github.sha }}" "$REGISTRY/web:latest"
            docker tag "$REGISTRY/admin:${{ github.sha }}" "$REGISTRY/admin:latest"
            docker push "$REGISTRY/api:latest"
            docker push "$REGISTRY/web:latest"
            docker push "$REGISTRY/admin:latest"
          fi

  deploy-cloud-run:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "GCP_PROJECT_ID not set — skipping Cloud Run deploy"
            exit 0
          fi
          export IMAGE_TAG="${{ github.sha }}"
          export SERVICE_SUFFIX="${{ github.ref == 'refs/heads/main' && '' || '-staging' }}"
          chmod +x scripts/gcp/cloud-run-deploy.sh
          ./scripts/gcp/cloud-run-deploy.sh api

      - name: Deploy Web
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then exit 0; fi
          export IMAGE_TAG="${{ github.sha }}"
          export SERVICE_SUFFIX="${{ github.ref == 'refs/heads/main' && '' || '-staging' }}"
          ./scripts/gcp/cloud-run-deploy.sh web

      - name: Deploy Admin
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then exit 0; fi
          export IMAGE_TAG="${{ github.sha }}"
          export SERVICE_SUFFIX="${{ github.ref == 'refs/heads/main' && '' || '-staging' }}"
          ./scripts/gcp/cloud-run-deploy.sh admin

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-cloud-run
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        env:
          API_URL: ${{ secrets.SMOKE_TEST_API_URL }}
          WEB_URL: ${{ secrets.SMOKE_TEST_WEB_URL }}
          ADMIN_URL: ${{ secrets.SMOKE_TEST_ADMIN_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "SMOKE_TEST_API_URL not set — skipping smoke tests"
            exit 0
          fi
          chmod +x scripts/deploy/smoke-test.sh
          ./scripts/deploy/smoke-test.sh
