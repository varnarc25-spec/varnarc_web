name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Security audit
        run: pnpm audit --audit-level=high
      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  e2e-web:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter @varnarc/web build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api/v1
      - name: Install Playwright Chromium
        run: pnpm --filter @varnarc/web exec playwright install --with-deps chromium
      - name: E2E smoke
        run: pnpm --filter @varnarc/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          CI: true

  lighthouse-web:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build web
        run: pnpm --filter @varnarc/web build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api/v1
      - name: Lighthouse CI
        run: pnpm lighthouse:ci
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci/

  container-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t varnarc-api:ci .
      - name: Trivy scan API image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: varnarc-api:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1
