name: varnarc

networks:
  varnarc_internal:
    driver: bridge
  varnarc_public:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  opensearch_data:

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - varnarc_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    profiles: [local-db]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: varnarc
      POSTGRES_PASSWORD: varnarc
      POSTGRES_DB: varnarc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - varnarc_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varnarc -d varnarc"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    profiles: [tools]
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - varnarc_internal

  pgadmin:
    profiles: [tools]
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@varnarc.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - varnarc_internal
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  opensearch:
    profiles: [search]
    image: opensearchproject/opensearch:2.17.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - varnarc_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "4000:4000"
    env_file:
      - ../.env
    environment:
      API_PORT: 4000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgresql://varnarc:varnarc@postgres:5432/varnarc}
      SEARCH_ENGINE: ${SEARCH_ENGINE:-postgres-fts}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX:-varnarc-search}
    networks:
      - varnarc_internal
      - varnarc_public
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
        NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    networks:
      - varnarc_public
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_ADMIN_URL: http://localhost:3001
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    networks:
      - varnarc_public
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
